<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GARAGE</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 100px;">
  <h1> Stato Garage</h1>
  <div id="stato" style="font-size: 40px; font-weight: bold;"></div>
  <button onclick="genera()">scopri stato</button>
  <script>
    const sito = "https://julianna-gloveless-isomerically.ngrok-free.dev"

    function genera() {
      const numero = Math.floor(Math.random() * 2);

      if (numero === 0) {
        document.getElementById("stato").innerText = "OCCUPATO";

        fetch(`${sito}/send`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            stato: "occupato"
          })
          .then(response => response.json())
          .then(data => console.log(data))
          .catch(error => console.error('Error:', error))
        })
      } else {
        document.getElementById("stato").innerText = "LIBERO";

        fetch(`${sito}/send`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            stato: "libero"
          })
          .then(response => response.json())
          .then(data => console.log(data))
          .catch(error => console.error('Error:', error))
        })
      }
    }
  </script>
</body>

</html>
